volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      device: /home/ldesboui/data/mariadb
      o: bind
      type: none
  backend:
    name: backend
    driver: local
    driver_opts:
      device: /home/ldesboui/commoncore/ft_transcendence/srcs/backend
      o: bind
      type: none
  nginx:
    name: nginx
    driver: local
    driver_opts:
      device: /home/ldesboui/commoncore/ft_transcendence/srcs/frontend
      o: bind
      type: none



services:

  nginx:
    container_name: nginx
    build: ./nginx
    ports:
      - "443:443"
    networks: 
      - ft_transcendence
    volumes:
      - nginx:/var/www/html
    restart: on-failure
    env_file: .env

  mariadb:
    container_name: mariadb
    build: ./mariadb
    ports:
      - "3306:3306"
    networks:
      - ft_transcendence
    volumes:
      - mariadb:/var/lib/mysql
    restart: on-failure
    expose:
      - "3306"
    env_file: .env 
  backend:
    container_name: backend
    build: ./backend
    depends_on:
      - mariadb
    ports:
      - "8080:8080"
    networks:
      - ft_transcendence
    volumes:
      - backend:/app
    restart: on-failure
    env_file: .env

networks:
  ft_transcendence:
    name: ft_transcendence
    driver: bridge
